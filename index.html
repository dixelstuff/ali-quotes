<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quote Cards</title>
<style>
  :root{
    --bg:#172234;
    --card:#edf3f8;
    --ink:#172234;
    --muted:#5f6f80;
    --line:#c7d5e2;
    --accent:#dcefff;
    --accentText:#1f5b7a;
    --soft:#eef5fa;
    --green:#38a86b;
    --amber:#d8942b;
    --red:#d45266;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0; min-height:100%; background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  body{padding:12px 12px calc(164px + env(safe-area-inset-bottom));}
  .app{max-width:560px; margin:0 auto;}
  .top{
    position:sticky; top:0; z-index:4; background:var(--bg);
    margin:-12px -12px 10px; padding:12px 12px 8px;
  }
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .count{font-size:.88rem; color:#d9e5f2; font-weight:850;}
  .stats{
    border:1px solid rgba(255,255,255,.32); background:rgba(255,255,255,.08); color:#eaf3fb;
    border-radius:999px; padding:7px 10px; font-weight:850; font-size:.82rem;
  }
  .card{
    background:var(--card); border:1px solid rgba(255,255,255,.30); border-radius:20px;
    padding:17px 16px; min-height:430px; max-height:430px; overflow:auto;
    display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(3,12,25,.20);
  }
  .cardHead{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:13px;}
  .tag,.status{
    display:inline-block; font-size:.76rem; font-weight:850; padding:7px 9px;
    border-radius:999px; white-space:nowrap;
  }
  .tag{
    color:#28566d; background:rgba(220,239,255,.35); border:1px solid #9fbfd2;
    max-width:72%; overflow:hidden; text-overflow:ellipsis;
  }
  .status{
    color:#5d6875; background:rgba(255,255,255,.35); border:1px solid #bdc9d5;
  }
  .status.new{color:var(--accentText); background:rgba(220,239,255,.55); border-color:#94c6e8;}
  .status.learn{color:#8a5b12; background:rgba(255,232,186,.62); border-color:#d4ad63;}
  .prompt{
    font-size:1.31rem; line-height:1.34; font-weight:830; letter-spacing:-.02em;
  }
  .context{
    margin-top:15px; color:var(--muted); font-size:1.07rem; line-height:1.42;
  }
  .quoteLine{font-size:1.22rem; line-height:1.42; font-weight:760;}
  .redacted{
    margin-top:17px; padding:15px; border-radius:16px;
    background:#f8fbfd; border:1px dashed #b8cad9;
    font-size:1.18rem; line-height:1.48;
  }
  .blank{
    display:inline-block; min-width:58px; border-bottom:2px solid #8aa4bb;
    transform:translateY(-2px); margin:0 3px; height:1.05em;
  }
  .answer{
    display:none; margin-top:18px; padding:15px; border-radius:16px;
    background:#f6fbf8; border:1px solid #c4e8d0;
  }
  .answer.show{display:block;}
  .card.answering .context.preAnswer{display:none;}
  .answer .label{
    font-size:.74rem; text-transform:uppercase; letter-spacing:.08em;
    font-weight:900; color:var(--green); margin-bottom:8px;
  }
  .answerQuote{font-size:1.24rem; line-height:1.36; font-weight:850;}
  .answerExplain{margin-top:10px; color:#4f6256; line-height:1.43; font-size:1.02rem;}
  .empty,.chooser{
    justify-content:center; text-align:center; color:var(--muted);
  }
  .empty h2,.chooser h2{color:var(--ink); margin:0 0 8px; font-size:1.55rem;}
  .empty p,.chooser p{font-size:1.06rem; line-height:1.45; margin:0 0 14px;}
  .choiceGrid{display:grid; grid-template-columns:1fr; gap:10px; margin-top:16px;}
  .choice{
    width:100%; border:1px solid #b6c7d7; background:#f8fbfd; color:var(--ink);
    border-radius:18px; padding:16px; font-size:1.12rem; font-weight:900;
  }
  .choice small{display:block; color:var(--muted); font-weight:750; margin-top:4px;}
  .bottom{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    padding:10px 12px calc(66px + env(safe-area-inset-bottom));
    background:var(--bg);
  }
  .bottom::before{
    content:""; position:absolute; left:0; right:0; top:-34px; height:34px; background:var(--bg);
    pointer-events:none;
  }
  .bottomInner{max-width:560px; margin:0 auto; position:relative; z-index:1;}
  button{font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .primary{
    width:100%; border:1px solid rgba(255,255,255,.35); border-radius:16px; padding:15px 16px;
    font-size:1.02rem; font-weight:900; color:var(--accentText); background:var(--accent);
  }
  .grades{display:none; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .grades.show{display:grid;}
  .grade{border:0; border-radius:16px; padding:14px 6px; color:#fff; font-weight:900; font-size:.96rem;}
  .hard{background:var(--red);}
  .medium{background:var(--amber);}
  .easy{background:var(--green);}
  .modalBack{
    display:none; position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.48);
    padding:18px 12px; align-items:flex-end;
  }
  .modalBack.show{display:flex;}
  .modal{
    max-width:560px; width:100%; margin:0 auto; background:#edf3f8; border:1px solid var(--line); border-radius:22px;
    padding:16px; box-shadow:0 24px 70px rgba(0,0,0,.22);
  }
  .modalHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .modal h2{font-size:1.08rem; margin:0;}
  .x{border:0; background:#dcefff; color:#2d6f8f; border-radius:999px; padding:8px 11px; font-weight:900;}
  .statsGrid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .stat{border:1px solid var(--line); border-radius:15px; padding:11px; background:#f8fbfd;}
  .stat b{display:block; font-size:1.28rem;}
  .stat span{font-size:.78rem; color:var(--muted); font-weight:800;}
  .small{font-size:.9rem; color:var(--muted); line-height:1.45;}
  .reset,.switch{
    width:100%; margin-top:12px; border-radius:14px; padding:11px; font-weight:900;
  }
  .reset{border:1px solid #ffd1d9; background:#fff5f7; color:#b23249;}
  .switch{border:1px solid #b6c7d7; background:#f8fbfd; color:#28566d;}
  .hidden{display:none!important}
  @media (max-height:720px){.card{min-height:390px; max-height:390px;}.bottom{padding-bottom:calc(52px + env(safe-area-inset-bottom));}body{padding-bottom:calc(146px + env(safe-area-inset-bottom));}}
  @media (max-height:650px){.card{min-height:350px; max-height:350px;}.prompt{font-size:1.22rem}.context,.answerExplain{font-size:.98rem}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="row">
      <div class="count" id="count">Loading…</div>
      <button class="stats" id="statsBtn" type="button">Stats</button>
    </div>
  </div>
  <main id="main"></main>
</div>

<div class="bottom" id="bottom">
  <div class="bottomInner">
    <button class="primary" id="revealBtn" type="button">Reveal Answer</button>
    <div class="grades" id="grades">
      <button class="grade hard" data-grade="hard" type="button">Hard</button>
      <button class="grade medium" data-grade="medium" type="button">Medium</button>
      <button class="grade easy" data-grade="easy" type="button">Easy</button>
    </div>
  </div>
</div>

<div class="modalBack" id="modalBack">
  <div class="modal">
    <div class="modalHead">
      <h2>Stats</h2>
      <button class="x" id="closeStats" type="button">Close</button>
    </div>
    <div id="statsContent"></div>
  </div>
</div>

<script>
const PROFILE_KEY = "quoteCardsLearner_v1";
const LEGACY_ALI_KEY = "quoteCardsSR_v5";       // previous version: existing data automatically means Ali
const ALI_KEY = "quoteCardsSR_ali_v6";
const NEVE_KEY = "quoteCardsSR_neve_v2";

const MIN = 60 * 1000;
const DAY = 24 * 60 * MIN;
const SIBLING_GAP = 7; // stronger spacing between cards about the same quote/fact
const MAX_REVIEWS_BEFORE_NEW = 2; // unseen cards must keep entering the flow
const EARLY_LEARNING_CAP_BEFORE_NEW = 1; // during first pass, allow only light review before another new card

const profiles = {
  ali: {name:"Ali", emoji:"🐚", key:ALI_KEY},
  neve:{name:"Neve", emoji:"🦉", key:NEVE_KEY}
};

const aliEvidence = [
  {topic:"Uncertainty", theme:"Unknown danger", quote:"That’s a boat!’ She cried,", cue:"Quote for sudden danger caused by uncertainty?", explanation:"Shows sudden recognition that uncertainty may have dangerous consequences."},
  {topic:"Uncertainty", theme:"Unknown danger", quote:"She didn’t have a split second to spare", cue:"Quote for urgency under uncertainty?", explanation:"Shows uncertainty creating immediate pressure and danger."},
  {topic:"Uncertainty", theme:"Unknown danger", quote:"Sarah had fallen", cue:"Short quote for a sudden consequence?", explanation:"The blunt phrasing makes the consequence feel immediate."},
  {topic:"Uncertainty", theme:"Sea symbol", quote:"Deep swells and surging tides", cue:"Quote for the sea as changing and unpredictable?", explanation:"The sea’s movement symbolises instability and uncertainty."},
  {topic:"Uncertainty", theme:"Sea symbol", quote:"He was just knee-deep in the water where he lost his brother", cue:"Quote linking water to loss?", explanation:"The sea becomes tied to grief, memory and the unknown."},
  {topic:"Uncertainty", theme:"Sea symbol", quote:"Then it becomes a fortress", cue:"Quote suggesting the sea/environment becomes a barrier?", explanation:"A fortress suggests something closed off and hard to penetrate."},
  {topic:"Uncertainty", theme:"Mental impact", quote:"It took me a long time… to move on", cue:"Quote for the long emotional impact of loss?", explanation:"Shows uncertainty and grief lingering over time."},
  {topic:"Uncertainty", theme:"Mental impact", quote:"Her scars stood out in the cold", cue:"Quote giving a physical image of trauma?", explanation:"Visible scars make emotional suffering feel bodily and lasting."},
  {topic:"Uncertainty", theme:"Mental impact", quote:"Brioney still didn’t know what grief was supposed to look like.", cue:"Quote directly linking grief and uncertainty?", explanation:"Shows uncertainty about how grief should even appear."},

  {topic:"Connection", theme:"Shared grief", quote:"To help with what I can", cue:"Quote for practical support easing suffering?", explanation:"Shows care through practical presence rather than perfect solutions."},
  {topic:"Connection", theme:"Shared grief", quote:"I’m sorry’ He said simply", cue:"Quote for simple empathy?", explanation:"Connection can be quiet, direct and emotionally useful."},
  {topic:"Connection", theme:"Shared grief", quote:"He reminded me of her, I guess. Or maybe of me.", cue:"Quote for connection through shared grief?", explanation:"Shows recognition of another person’s pain as familiar."},
  {topic:"Connection", theme:"Parent-child", quote:"Ren stayed at his fathers bedside", cue:"Quote for family loyalty and presence?", explanation:"Staying at the bedside shows care and endurance."},
  {topic:"Connection", theme:"Parent-child", quote:"He swallowed against the grief", cue:"Quote for trying to contain grief?", explanation:"Shows suffering being held in, rather than removed."},
  {topic:"Connection", theme:"Parent-child", quote:"It’s a lot", cue:"Quote for the burden of caring for a parent?", explanation:"The understatement makes the suffering feel realistic."},
  {topic:"Connection", theme:"Sibling", quote:"He’d been there on her worst day", cue:"Quote for sibling support during suffering?", explanation:"Shared history gives comfort and stability."},
  {topic:"Connection", theme:"Sibling", quote:"It would always be her brother Mike", cue:"Quote for lasting sibling connection?", explanation:"Shows the sibling bond remains emotionally central."},
  {topic:"Connection", theme:"Sibling", quote:"Mike placed a hand on her shoulder", cue:"Quote for physical comfort from a sibling?", explanation:"A small gesture shows support without needing explanation."}
];

const neveEvidence = [
  {topic:"Uncertainty", theme:"Lack of closure", quote:"it just felt like living with a ghost… Seeing her things made me sick.", cue:"Quote for uncertainty trapping Briony in grief?", explanation:"Shows how Sarah’s absence turns ordinary domestic objects into painful reminders, because there is no closure."},
  {topic:"Uncertainty", theme:"Guilt and what-ifs", quote:"I spent months beating myself up for every minute of the day my sister vanished.", cue:"Quote for uncertainty creating obsessive guilt?", explanation:"Briony replays the day of Sarah’s disappearance, torturing herself with what-if thinking."},
  {topic:"Uncertainty", theme:"Mental toll", quote:"accustomed to waking in the night to panic attacks", cue:"Quote for the physical and mental toll of not knowing?", explanation:"The lack of answers becomes bodily trauma and sleep disruption."},

  {topic:"Uncertainty", theme:"Survival fear", quote:"No one knew they were here.", cue:"Quote for being trapped without rescue?", explanation:"The girls realise no one is coming for them specifically, intensifying uncertainty about survival."},
  {topic:"Uncertainty", theme:"Hope vs reality", quote:"We’ll be okay. People will notice when we don’t come home… Reality crept in with the darkness steadily engulfing the heart of the island.", cue:"Quote for hope being overtaken by fear?", explanation:"Aria tries to maintain hope, but the darkening island mirrors psychological panic."},
  {topic:"Uncertainty", theme:"Fear beneath confidence", quote:"Sarah had assured her that they’d make it work, but Aria hadn’t missed the way her brows knitted together", cue:"Quote for fear showing beneath attempted confidence?", explanation:"Sarah’s body language reveals uncertainty even while she tries to sound brave."},

  {topic:"Uncertainty", theme:"Anticipatory grief", quote:"Dad is refusing hospital treatment… I don’t think we have a lot of time left.", cue:"Quote for Ren facing an uncertain future loss?", explanation:"Ren knows death is coming but not when, creating an invisible countdown."},
  {topic:"Uncertainty", theme:"Limbo", quote:"The father he’d loved and begrudged in equal measure was beside him in the same moments that he was gone", cue:"Quote for someone being present but already slipping away?", explanation:"Ren cannot process grief cleanly because his father feels both present and absent."},
  {topic:"Uncertainty", theme:"Haunted home", quote:"There were ghosts here he wasn’t prepared to face.", cue:"Quote for the family home as a haunted space?", explanation:"The uncertainty of his father’s decline makes the home feel emotionally threatening."},

  {topic:"Connection", theme:"Touch as stability", quote:"his hand found hers… it felt like an anchor… the ghosts of the past… seemed to retreat into the shadows", cue:"Quote for touch giving temporary stability?", explanation:"Physical connection offers something real and steady, pushing grief into the background."},
  {topic:"Connection", theme:"Temporary escape", quote:"letting the physical sensation wash over her, drowning out the endless, agonizing questions that usually filled her mind", cue:"Quote for connection drowning out painful questions?", explanation:"Intimacy becomes a temporary escape from unanswerable grief and uncertainty."},
  {topic:"Connection", theme:"Present moment relief", quote:"For the first time in months, he wasn't thinking about the hospital room or the ticking clock", cue:"Quote for connection pulling Ren into the present?", explanation:"Connection briefly interrupts Ren’s anticipatory grief about his father."},

  {topic:"Connection", theme:"Sibling refuge", quote:"When he heard their father’s car pull up, they would slip out the back door", cue:"Quote for siblings escaping domestic conflict together?", explanation:"Ren and Sam’s bond becomes a refuge from the tension of their parents’ conflict."},
  {topic:"Connection", theme:"Shared refuge", quote:"the sound of their parents’ arguing fading away until there was only the sound of the wind and each other.", cue:"Quote for sibling connection replacing conflict?", explanation:"The brothers find a physical and emotional refuge in each other’s presence."},
  {topic:"Connection", theme:"Safe confusion", quote:"Why did Mum leave?", cue:"Quote for a sibling becoming a safe person to ask painful questions?", explanation:"Sam turns to Ren to process the divorce, showing sibling connection as emotional safety."},

  {topic:"Connection", theme:"Reassurance", quote:"Aria shuffled closer. ‘We’ll be okay.’", cue:"Quote for simple human presence soothing fear?", explanation:"When terror peaks, Aria moves closer and offers reassurance."},
  {topic:"Connection", theme:"Unspoken understanding", quote:"Sarah had assured her that they’d make it work, but Aria hadn’t missed the way her brows knitted together", cue:"Quote for reading another person’s fear?", explanation:"Aria notices Sarah’s hidden fear, showing unspoken understanding between them."},
  {topic:"Connection", theme:"Survival comfort", quote:"they curled small against each other to keep the cold out.", cue:"Quote for physical closeness as survival and comfort?", explanation:"The girls use closeness to resist both literal cold and emotional terror."}
];

function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function redact(q){
  const parts = q.split(/(\s+)/);
  const targets = [];
  parts.forEach((w,idx)=>{
    const plain = w.replace(/[^A-Za-z]/g,"");
    if(plain.length >= 5) targets.push(idx);
  });
  if(targets.length < 2) return "";
  const chosen = [];
  const step = Math.max(1, Math.floor(targets.length / 3));
  for(let i=0; i<targets.length && chosen.length<3; i+=step) chosen.push(targets[i]);
  return parts.map((w,idx)=> chosen.includes(idx) ? '<span class="blank"></span>' : esc(w)).join("");
}
function quoteText(q){ return "“" + esc(q) + "”"; }

function buildCards(evidence){
  const cards = [];
  evidence.forEach((e,i)=>{
    const qid = "q"+i;
    cards.push({
      id:qid+"_quote", qid, type:"quote", rank:1,
      topic:e.topic, theme:e.theme, prompt:e.cue, context:"",
      answer:e.quote, answerIsQuote:true, explanation:e.explanation
    });
    const r = redact(e.quote);
    if(r){
      cards.push({
        id:qid+"_blank", qid, type:"gaps", rank:2,
        topic:e.topic, theme:e.theme, prompt:"Fill the missing words.", redacted:r, context:e.theme,
        answer:e.quote, answerIsQuote:true, explanation:e.explanation
      });
    }
    cards.push({
      id:qid+"_use", qid, type:"use", rank:3,
      topic:e.topic, theme:e.theme,
      prompt:"What does this quote help prove?",
      context:"“"+e.quote+"”",
      answer:e.theme, answerIsQuote:false, explanation:e.explanation
    });
  });
  return cards;
}

let profileId = getInitialProfile();
let profile = profileId ? profiles[profileId] : null;
let cards = profileId ? buildCards(profileId === "neve" ? neveEvidence : aliEvidence) : [];
let state = profileId ? load() : null;
let current = null;
let lastQid = null;
let recentQids = state?.recentQids || [];
let sessionTick = state?.sessionTick || 0;

function getInitialProfile(){
  const hasAliLegacy = !!localStorage.getItem(LEGACY_ALI_KEY);
  if(hasAliLegacy){
    if(!localStorage.getItem(ALI_KEY)){
      localStorage.setItem(ALI_KEY, localStorage.getItem(LEGACY_ALI_KEY));
    }
    localStorage.setItem(PROFILE_KEY, "ali");
    return "ali";
  }
  const saved = localStorage.getItem(PROFILE_KEY);
  return saved && profiles[saved] ? saved : null;
}

function chooseProfile(id){
  localStorage.setItem(PROFILE_KEY, id);
  profileId = id;
  profile = profiles[id];
  cards = buildCards(id === "neve" ? neveEvidence : aliEvidence);
  state = load();
  recentQids = state.recentQids || [];
  sessionTick = state.sessionTick || 0;
  render();
}

function freshState(){
  const now = Date.now();
  const s = {};
  cards.forEach(c=>s[c.id]={
    status:"new", due:now, sessionDue:0, seen:false, reps:0, ease:2.3,
    interval:0, lapses:0, lastGrade:null, lastReviewed:0
  });
  return {cards:s, history:[], sessionTick:0, recentQids:[], reviewsSinceNew:0, introducedCount:0};
}

function load(){
  try{
    const saved = JSON.parse(localStorage.getItem(profile.key));
    if(!saved || !saved.cards) throw 0;
    const base = freshState();
    Object.keys(base.cards).forEach(id=>{ if(!saved.cards[id]) saved.cards[id] = base.cards[id]; });
    Object.keys(saved.cards).forEach(id=>{ if(!base.cards[id]) delete saved.cards[id]; });
    saved.history = saved.history || [];
    saved.sessionTick = saved.sessionTick || 0;
    saved.recentQids = saved.recentQids || [];
    saved.reviewsSinceNew = saved.reviewsSinceNew || 0;
    saved.introducedCount = saved.introducedCount || 0;
    return saved;
  }catch(e){ return freshState(); }
}

function save(){
  state.sessionTick = sessionTick;
  state.recentQids = recentQids;
  state.introducedCount = cards.filter(c=>s(c).status !== "new").length;
  localStorage.setItem(profile.key, JSON.stringify(state));
}
function s(c){return state.cards[c.id];}

function eligibleReviews(){
  const now = Date.now();
  return cards.filter(c=>{
    const st = s(c);
    return st.status !== "new" && (st.due <= now || st.sessionDue <= sessionTick);
  });
}
function eligibleNew(){ return cards.filter(c=>s(c).status === "new"); }

function siblingPenalty(c){
  const pos = recentQids.lastIndexOf(c.qid);
  if(pos === -1) return 0;
  return 6500 + (pos + 1) * 1500;
}
function isRecentSibling(c){ return recentQids.includes(c.qid); }
function rememberQid(qid){
  recentQids.push(qid);
  while(recentQids.length > SIBLING_GAP) recentQids.shift();
}
function pushSiblingCardsBack(qid){
  cards.forEach(c=>{
    if(c.qid !== qid || c.id === current.id) return;
    const st = s(c);
    if(st.status !== "new") st.sessionDue = Math.max(st.sessionDue || 0, sessionTick + SIBLING_GAP);
  });
}

function nextNew(fresh){
  // Introduce unseen cards broadly across the deck and across card styles.
  // This prevents getting trapped in a small loop before seeing the rest.
  const preferredRank = (sessionTick % 3) + 1;
  const nonRecent = fresh.filter(c=>!isRecentSibling(c));
  const pool = nonRecent.length ? nonRecent : fresh;

  const byRank = pool.filter(c=>c.rank === preferredRank);
  const rankedPool = byRank.length ? byRank : pool;

  // Prefer quote groups with the fewest introduced siblings so all facts appear early.
  rankedPool.sort((a,b)=>{
    return introducedForQid(a.qid) - introducedForQid(b.qid)
      || a.rank - b.rank
      || a.qid.localeCompare(b.qid);
  });
  return rankedPool[0];
}

function introducedForQid(qid){
  return cards.filter(c=>c.qid === qid && s(c).status !== "new").length;
}

function mustShowNew(fresh, reviews){
  if(!fresh.length) return false;

  if((state.reviewsSinceNew || 0) >= MAX_REVIEWS_BEFORE_NEW) return true;

  // First pass: bias hard toward opening the deck.
  // Reviews can interrupt, but not dominate.
  const learningDue = reviews.filter(c=>s(c).status === "learning").length;
  if(learningDue <= EARLY_LEARNING_CAP_BEFORE_NEW) return true;

  return false;
}

function pick(){
  const reviews = eligibleReviews();
  const fresh = eligibleNew();

  // Forward-progress rule:
  // If unseen cards exist, keep introducing them regularly.
  // Reviews still happen, but they cannot trap the learner in a closed loop.
  if(mustShowNew(fresh, reviews)){
    return nextNew(fresh);
  }

  let pool = [];

  if(reviews.length){
    pool = reviews.slice();
  }else if(fresh.length){
    return nextNew(fresh);
  }else{
    // Only after every card has been introduced do we use Ready Again fallback.
    const seen = cards.filter(c=>s(c).status !== "new");
    if(!seen.length) return null;
    const nonSiblingSeen = seen.filter(c => !isRecentSibling(c));
    const fallbackPool = nonSiblingSeen.length ? nonSiblingSeen : seen;
    fallbackPool.sort((a,b)=>{
      const as=s(a), bs=s(b);
      return siblingPenalty(a)-siblingPenalty(b)
        || Math.min(as.sessionDue, 999999) - Math.min(bs.sessionDue, 999999)
        || as.due - bs.due;
    });
    return {...fallbackPool[0], early:true};
  }

  pool = pool.filter(Boolean);
  const nonRecentPool = pool.filter(c => !isRecentSibling(c));
  if(nonRecentPool.length) pool = nonRecentPool;

  pool.sort((a,b)=>{
    const as=s(a), bs=s(b);
    const aLearn = as.status === "learning" ? 0 : 1;
    const bLearn = bs.status === "learning" ? 0 : 1;
    return siblingPenalty(a)-siblingPenalty(b)
      || aLearn-bLearn
      || as.sessionDue-bs.sessionDue
      || as.due-bs.due
      || a.rank-b.rank;
  });
  return pool[0];
}

function statusLabel(card){
  const st = s(card);
  if(card.early) return "Ready again?";
  if(st.status === "new") return "New";
  if(st.status === "learning") return "Learning";
  return "Review";
}

function renderChooser(){
  document.getElementById("count").textContent = "Choose learner";
  document.getElementById("statsBtn").classList.add("hidden");
  document.getElementById("bottom").classList.add("hidden");
  document.getElementById("main").innerHTML = `
    <section class="card chooser">
      <h2>Who’s learning?</h2>
      <p>Each learner gets their own quote set and saved progress.</p>
      <div class="choiceGrid">
        <button class="choice" data-pick="ali">🐚 Ali<small>Original quote set</small></button>
        <button class="choice" data-pick="neve">🦉 Neve<small>New quote set</small></button>
      </div>
    </section>`;
  document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>chooseProfile(b.dataset.pick));
}

function render(){
  if(!profileId){ renderChooser(); return; }

  document.getElementById("statsBtn").classList.remove("hidden");
  document.getElementById("bottom").classList.remove("hidden");

  current = pick();
  updateTop();

  const main = document.getElementById("main");
  document.getElementById("revealBtn").classList.remove("hidden");
  document.getElementById("grades").classList.remove("show");
  document.getElementById("revealBtn").textContent = current && current.early ? "Ready Again?" : "Reveal Answer";

  if(!current){
    main.innerHTML = `<section class="card empty"><h2>Ready?</h2><p>Start with a new card.</p></section>`;
    return;
  }

  const st = s(current);
  const status = statusLabel(current);
  const statusClass = st.status === "new" ? "new" : st.status === "learning" || current.early ? "learn" : "";

  main.innerHTML = `
    <section class="card">
      <div class="cardHead">
        <span class="tag">${profile.emoji} ${esc(current.topic)}</span>
        <span class="status ${statusClass}">${status}</span>
      </div>
      <div class="prompt">${esc(current.prompt)}</div>
      ${current.redacted ? `<div class="redacted">“${current.redacted}”</div>` : ""}
      ${current.context ? `<div class="context preAnswer ${current.type === "use" ? "quoteLine" : ""}">${esc(current.context)}</div>` : ""}
      <div class="answer" id="answer">
        <div class="label">Answer</div>
        <div class="answerQuote">${current.answerIsQuote ? quoteText(current.answer) : esc(current.answer)}</div>
        <div class="answerExplain">${esc(current.explanation)}</div>
      </div>
    </section>`;
}

function reveal(){
  if(!profileId || !current) return;
  if(current.early){
    const real = cards.find(c=>c.id === current.id);
    s(real).sessionDue = sessionTick;
    s(real).due = Date.now();
    current = real;
    render();
    return;
  }
  document.getElementById("answer").classList.add("show");
  document.querySelector(".card")?.classList.add("answering");
  document.getElementById("revealBtn").classList.add("hidden");
  document.getElementById("grades").classList.add("show");
}

function grade(g){
  if(!current || current.early) return;
  const st = s(current);
  const now = Date.now();
  const wasNew = st.status === "new";
  sessionTick++;
  st.seen = true;
  st.reps++;
  st.lastGrade = g;
  st.lastReviewed = now;

  if(wasNew){
    state.reviewsSinceNew = 0;
  }else{
    state.reviewsSinceNew = (state.reviewsSinceNew || 0) + 1;
  }

  if(g === "hard"){
    st.lapses++;
    st.ease = Math.max(1.3, st.ease - .22);
    st.status = "learning";
    st.sessionDue = sessionTick + 4;
    st.interval = 4 * MIN;
  }else if(g === "medium"){
    st.ease = Math.max(1.45, st.ease - .03);
    if(st.reps < 3){
      st.status = "learning";
      st.sessionDue = sessionTick + 9;
      st.interval = 20 * MIN;
    }else{
      st.status = "review";
      st.sessionDue = sessionTick + 16;
      st.interval = Math.max(8 * 60 * MIN, Math.round((st.interval || 6*60*MIN) * 1.7));
    }
  }else{
    st.ease = Math.min(3.2, st.ease + .08);
    if(wasNew){
      st.status = "learning";
      st.sessionDue = sessionTick + 13;
      st.interval = 90 * MIN;
    }else{
      st.status = "review";
      st.sessionDue = sessionTick + 24;
      st.interval = Math.max(1 * DAY, Math.round((st.interval || 1*DAY) * st.ease));
    }
  }

  st.due = now + st.interval;
  lastQid = current.qid;
  rememberQid(current.qid);
  pushSiblingCardsBack(current.qid);
  state.history.push({id:current.id, qid:current.qid, grade:g, t:now, tick:sessionTick});
  if(state.history.length > 800) state.history = state.history.slice(-800);
  save();
  render();
}

function updateTop(){
  const introduced = cards.filter(c=>s(c).status !== "new").length;
  const unseen = cards.length - introduced;
  const due = eligibleReviews().length;
  const learning = cards.filter(c=>s(c).status === "learning").length;
  document.getElementById("count").textContent = `${profile.emoji} ${profile.name} · ${introduced}/${cards.length} seen · ${unseen} new · ${learning} learning`;
}

function showStats(){
  if(!profileId) return;
  updateTop();
  const introduced = cards.filter(c=>s(c).status !== "new").length;
  const due = eligibleReviews().length;
  const learning = cards.filter(c=>s(c).status === "learning").length;
  const review = cards.filter(c=>s(c).status === "review").length;
  const easy = Object.values(state.cards).filter(x=>x.lastGrade==="easy").length;
  const med = Object.values(state.cards).filter(x=>x.lastGrade==="medium").length;
  const hard = Object.values(state.cards).filter(x=>x.lastGrade==="hard").length;

  document.getElementById("statsContent").innerHTML = `
    <div class="statsGrid">
      <div class="stat"><b>${profile.emoji} ${profile.name}</b><span>Learner</span></div>
      <div class="stat"><b>${introduced}/${cards.length}</b><span>Seen</span></div>
      <div class="stat"><b>${learning}</b><span>Learning</span></div>
      <div class="stat"><b>${review}</b><span>Review</span></div>
      <div class="stat"><b>${cards.length - introduced}</b><span>New left</span></div>
      <div class="stat"><b>${easy}/${med}/${hard}</b><span>Easy / Med / Hard</span></div>
    </div>
    <p class="small">Progress is saved separately for each learner. New cards are forced into the flow regularly so the deck keeps opening up instead of trapping you in a review loop.</p>
    <button class="switch" id="switchBtn" type="button">Switch learner</button>
    <button class="reset" id="resetBtn" type="button">Reset ${profile.name} progress</button>`;
  document.getElementById("modalBack").classList.add("show");

  document.getElementById("switchBtn").onclick = ()=>{
    document.getElementById("modalBack").classList.remove("show");
    localStorage.removeItem(PROFILE_KEY);
    profileId = null; profile = null; cards = []; state = null; current = null;
    renderChooser();
  };

  document.getElementById("resetBtn").onclick = ()=>{
    if(confirm("Reset progress for " + profile.name + "?")){
      localStorage.removeItem(profile.key);
      state = load();
      sessionTick = 0;
      recentQids = [];
      state.reviewsSinceNew = 0;
      state.introducedCount = 0;
      document.getElementById("modalBack").classList.remove("show");
      render();
    }
  };
}

document.getElementById("revealBtn").onclick = reveal;
document.querySelectorAll("[data-grade]").forEach(b=>b.onclick=()=>grade(b.dataset.grade));
document.getElementById("statsBtn").onclick = showStats;
document.getElementById("closeStats").onclick = ()=>document.getElementById("modalBack").classList.remove("show");
document.getElementById("modalBack").onclick = e=>{ if(e.target.id==="modalBack") document.getElementById("modalBack").classList.remove("show"); };

render();
</script>
</body>
</html>
